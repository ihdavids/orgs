todo_views:
  alltasks: "!IsArchived() && !IsProject() && IsTodo()// Lists all tasks found"
  today:    "!IsProject() && IsTodo() && Today()"
  untagged: "!IsProject() && IsTodo() && NoTags()"
  next:     "!IsProject() && IsTodo() && IsStatus('NEXT')"
  projects: "IsProject()"
  romark: "!IsArchived() && !IsProject() && IsTodo() && (IsPartOfProject('.*ROMARK.*') || HasTags('RoMark'))"
  atest: "!IsProject() && IsTodo() && !IsArchived() && MatchHeadline('A.*')"